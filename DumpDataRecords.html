<body link="navy" vlink="navy" bgcolor="FFFFCC">

<p>
<h1>Command <code>DumpDataRecords</code></h1>
</p>
<p>
<h2>Command format</h2>
</p>
<p>
<p><code>DumpDataRecords</code> <var>Record-1</var> <var>Record-2</var> ...
</p>
</p>
<p>
This command prints out the current values of the data records.  If <var>Record-n</var> labels
are present, then those records are dumped.  If no records are listed then all are dumped out.
</p>
