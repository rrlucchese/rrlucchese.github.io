<p>
<h1>Command <code>SaveTMats</code></h1>
</p>
<p>
<h2>Command format</h2>
</p>
<p>
<p><code>SaveTMats</code> <var>File</var></p>
</p>
<p>
Where <var>File</var> is file where the data is to be written.
This data can then be read as a normal T-matrix or K-matrix file using commands
such as the
<a href ="MatrixElementsCollect"> MatrixElementsCollect</a>
command.
</p>
