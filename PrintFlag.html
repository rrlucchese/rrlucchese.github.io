<p>
<h1>Command <code>PrintFlag</code></h1>
</p>
<p>
<h2>Command format</h2>
</p>
<p>
<p><code>PrintFlag</code> <var>iprnfg</var>
</p>
</p>
<p>
This command sets the flag which controls the amount of output.  The default of
<var>iprnfg</var> is 0.  Higher
values give more printed output.
</p>
